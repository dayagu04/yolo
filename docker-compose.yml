services:
  backend:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - CONFIG_FILE=config.yaml
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    expose:
      - "8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - yolo_network

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${YOLO_DATABASE_PASSWORD}
      MYSQL_DATABASE: security_monitor
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yolo_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /n/index:/srv/index:ro
      - ./frontend:/srv/surveillance:ro
    depends_on:
      - backend
    networks:
      - yolo_network

volumes:
  mysql_data:

networks:
  yolo_network:
    driver: bridge
