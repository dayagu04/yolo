# 测试环境配置文件
# 配置版本: v2.0 (Test)

# ============================================================
# 摄像头配置（测试环境禁用自动启动）
# ============================================================
cameras: []  # 空列表，不自动启动摄像头

# ============================================================
# 检测配置
# ============================================================
detection:
  model_path: "models/person_best.pt"
  conf_threshold: 0.5
  detect_every_n: 1
  gpu_enabled: false
  device: "cpu"

# ============================================================
# 告警配置
# ============================================================
alert:
  cooldown_sec: 5.0
  track_ttl_sec: 2.0
  screenshot:
    enabled: true
    quality: 75
    save_mode: "first_only"
    interval_sec: 10
    retention_days: 30
    crop_detection: false
    save_dir: "data/screenshots"

# ============================================================
# 通知配置
# ============================================================
notifications:
  feishu:
    enabled: false
    push_cooldown_sec: 60
    push_level: "high"
    include_screenshot: true

# ============================================================
# MySQL 数据库配置
# ============================================================
database:
  type: "mysql"
  host: "localhost"
  port: 3306
  user: "root"
  password: "${YOLO_DATABASE_PASSWORD}"
  database: "security_monitor"
  charset: "utf8mb4"
  pool_size: 5
  pool_recycle: 3600

# ============================================================
# Redis 配置（可选）
# ============================================================
redis:
  enabled: false
  host: "localhost"
  port: 6379
  password: null
  db: 0
  decode_responses: true

# ============================================================
# 服务器配置
# ============================================================
server:
  host: "0.0.0.0"
  port: 8000
  reload: false
  workers: 1

# ============================================================
# 系统配置
# ============================================================
system:
  log_level: "INFO"
  cleanup_schedule: "03:00"
