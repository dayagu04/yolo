# Pytest 配置文件

[pytest]
# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = test

# 输出选项
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=backend
    --cov-report=html:tmp/coverage_html
    --cov-report=term-missing
    --html=tmp/pytest_report.html
    --self-contained-html

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端测试
    slow: 慢速测试
    fast: 快速测试
    database: 数据库测试
    api: API测试
    camera: 摄像头测试
    websocket: WebSocket测试
    performance: 性能测试
    security: 安全测试
    boundary: 边界测试
    exception: 异常测试

# 异步测试支持
asyncio_mode = auto

# 日志配置
log_cli = true
log_cli_level = INFO
log_file = tmp/pytest.log
log_file_level = DEBUG

# 超时设置（秒）
timeout = 300

# 并发设置
# -n auto 表示自动检测 CPU 核心数
# addopts = -n auto
