# Alembic 配置文件
# 使用方式:
#   alembic revision --autogenerate -m "描述"
#   alembic upgrade head
#   alembic downgrade -1

[alembic]
script_location = alembic
# 数据库 URL 由 env.py 从 config.yaml 动态读取，此处留空
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
