<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>监控APP - 实时视频</title>
    <style>
        body {
            margin: 0; padding: 0; background: #111; color: white; font-family: 'Microsoft YaHei', Arial;
            display: flex; flex-direction: column; height: 100vh;
        }
        header {
            background: #1a1a1a; padding: 15px; text-align: center; font-size: 18px;
        }
        .video-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: #000; position: relative;
        }
        img, video {
            max-width: 100%; max-height: 100%; border: 3px solid #0f0;
        }
        .controls {
            background: #1a1a1a; padding: 15px; display: flex; justify-content: center; gap: 10px;
        }
        button {
            padding: 12px 24px; background: #0a0; color: white; border: none;
            border-radius: 6px; font-size: 16px; cursor: pointer;
        }
        button:hover { background: #0f0; }
        .alert {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: red; color: white; padding: 10px 20px; border-radius: 4px;
            display: none; font-weight: bold;
        }
        footer {
            text-align: center; padding: 10px; font-size: 12px; color: #666;
        }
    </style>
</head>
<body>
    <header>
        <h2>📹 智能安防监控</h2>
    </header>
    
    <div class="video-container">
        <img id="stream" src="http://localhost:8000/video_feed" alt="实时画面">
        <div class="alert" id="alert">⚠️ 检测到人员闯入！</div>
    </div>
    
    <div class="controls">
        <button onclick="toggleStream()">暂停/继续</button>
        <button onclick="window.location.href='http://localhost:8000'">服务器监控</button>
    </div>
    
    <footer>
        阶段1 - 实时监控 | 后续将集成YOLO检测和多摄像头拼接
    </footer>

    <script>
        let isPlaying = true;
        const streamImg = document.getElementById('stream');
        const alertBox = document.getElementById('alert');
        
        function toggleStream() {
            isPlaying = !isPlaying;
            if (!isPlaying) {
                streamImg.style.opacity = '0.3';
            } else {
                streamImg.style.opacity = '1';
                streamImg.src = streamImg.src; // 重新加载
            }
        }
        
        // 模拟报警 (后续替换为WebSocket)
        setInterval(() => {
            if (Math.random() < 0.1) {
                alertBox.style.display = 'block';
                setTimeout(() => {
                    alertBox.style.display = 'none';
                }, 3000);
            }
        }, 5000);
        
        console.log('监控APP已加载 - 正在接收实时视频流');
    </script>
</body>
</html>
