<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能安防监控</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #13131a;
      --surface2: #1c1c26;
      --border:   #252535;
      --accent:   #00e5ff;
      --accent2:  #7c4dff;
      --danger:   #ff1744;
      --warn:     #ff9100;
      --ok:       #00e676;
      --text:     #e2e2f0;
      --muted:    #55556a;
      --radius:   6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      display: grid;
      grid-template-rows: 48px 1fr 220px 36px;
      overflow: hidden;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 18px; gap: 12px;
    }
    .logo { font-size: 15px; font-weight: 700; letter-spacing: 1.5px; color: var(--accent); }
    .logo span { color: var(--text); font-weight: 400; }
    header .sep { width: 1px; height: 20px; background: var(--border); }
    .ws-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--muted);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 20px;
      transition: border-color .3s, color .3s;
    }
    .ws-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background .3s; }
    .ws-pill.connected { border-color: var(--ok); color: var(--ok); }
    .ws-pill.connected .dot { background: var(--ok); box-shadow: 0 0 5px var(--ok); }
    .ws-pill.error { border-color: var(--danger); color: var(--danger); }
    .ws-pill.error .dot { background: var(--danger); }
    header .spacer { flex: 1; }
    .hstat { font-size: 12px; color: var(--muted); }
    .hstat b { color: var(--text); font-weight: 600; }
    .hstat + .hstat { margin-left: 14px; }

    /* ── Main ── */
    main { display: grid; grid-template-columns: 1fr 270px; overflow: hidden; }

    /* ── Video ── */
    .video-panel {
      position: relative; background: #000;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    #stream { width: 100%; height: 100%; object-fit: contain; display: block; }

    .alert-banner {
      position: absolute; top: 14px; left: 50%;
      transform: translateX(-50%) translateY(-70px);
      background: linear-gradient(135deg, #c62828, var(--danger));
      color: #fff; padding: 9px 22px; border-radius: var(--radius);
      font-weight: 700; font-size: 14px; letter-spacing: .5px;
      box-shadow: 0 4px 20px rgba(255,23,68,.4);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap; pointer-events: none; z-index: 10;
    }
    .alert-banner.show { transform: translateX(-50%) translateY(0); }

    .count-badge {
      position: absolute; bottom: 14px; left: 14px;
      background: rgba(0,0,0,.75);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      border: 1px solid var(--accent); color: var(--accent);
      padding: 4px 12px; border-radius: 4px;
      font-size: 12px; font-weight: 600;
    }
    .count-badge.hidden { display: none; }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sb-section { padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .sb-section h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 10px; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .stat-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 9px; text-align: center;
    }
    .stat-card .val { font-size: 20px; font-weight: 700; color: var(--accent); line-height: 1; }
    .stat-card .lbl { font-size: 10px; color: var(--muted); margin-top: 3px; }
    .stat-card--wide { grid-column: span 2; }
    .stat-val--sm { font-size: 13px; }

    .health-row { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--muted); padding: 3px 0; }
    .badge { font-size: 10px; padding: 1px 7px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); }
    .badge.ok   { border-color: var(--ok);     color: var(--ok); }
    .badge.warn { border-color: var(--warn);   color: var(--warn); }
    .badge.err  { border-color: var(--danger); color: var(--danger); }

    .control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px; font-size: 12px; }
    .toggle { position: relative; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 20px; cursor: pointer; transition: background .2s; }
    .toggle-slider::before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .2s; }
    .toggle input:checked + .toggle-slider { background: var(--accent2); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

    .range-row { margin-bottom: 9px; }
    .range-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .range-label span { color: var(--text); }
    input[type=range] { width: 100%; accent-color: var(--accent2); }

    .alert-list-wrap { flex: 1; overflow-y: auto; padding: 0 16px 12px; }
    .alert-list-wrap h3 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted);
      padding: 12px 0 8px; position: sticky; top: 0; background: var(--surface);
    }

    .log-item { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
    .log-item .dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .dot-alert  { background: var(--danger); box-shadow: 0 0 4px var(--danger); }
    .dot-status { background: var(--ok); }
    .dot-info   { background: var(--muted); }
    .log-item .log-time { color: var(--muted); white-space: nowrap; }
    .log-item .log-msg  { color: var(--text); line-height: 1.4; }
    .log-empty { color: var(--muted); font-size: 11px; text-align: center; padding: 16px 0; }

    /* ── Log Panel ── */
    .log-panel { background: var(--surface); border-top: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .log-panel-header {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .log-panel-header h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); }
    .log-panel-header .spacer { flex: 1; }
    .level-btn {
      font-size: 10px; padding: 2px 8px; border-radius: 10px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; transition: all .15s;
    }
    .level-btn.active-all   { border-color: var(--accent);  color: var(--accent); }
    .level-btn.active-info  { border-color: var(--ok);      color: var(--ok); }
    .level-btn.active-warn  { border-color: var(--warn);    color: var(--warn); }
    .level-btn.active-error { border-color: var(--danger);  color: var(--danger); }

    .log-entries {
      flex: 1; overflow-y: auto; padding: 4px 16px 8px;
      font-family: 'Consolas', 'Courier New', monospace; font-size: 11px;
    }
    .log-entry { display: flex; gap: 10px; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,.03); line-height: 1.5; }
    .log-entry .le-ts  { color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .log-entry .le-lvl { width: 50px; flex-shrink: 0; font-weight: 600; }
    .le-lvl.info    { color: var(--ok); }
    .le-lvl.warning { color: var(--warn); }
    .le-lvl.error   { color: var(--danger); }
    .le-lvl.debug   { color: var(--muted); }
    .log-entry .le-evt { color: var(--accent2); flex-shrink: 0; min-width: 160px; }
    .log-entry .le-msg { color: var(--text); }

    /* ── Footer ── */
    footer {
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 8px;
    }
    .btn {
      padding: 4px 12px; border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      border-radius: var(--radius); font-size: 11px;
      cursor: pointer; transition: all .15s;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.danger:hover { border-color: var(--danger); color: var(--danger); }
    footer .spacer { flex: 1; }
    .footer-info { font-size: 10px; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="logo">SURV<span>EILLANCE</span></div>
  <div class="sep"></div>
  <div class="ws-pill" id="wsPill">
    <div class="dot"></div>
    <span id="wsLabel">连接中…</span>
  </div>
  <div class="spacer"></div>
  <div class="hstat">摄像头 <b id="hCamId">0</b></div>
  <div class="hstat">今日告警 <b id="hAlertCount">0</b></div>
  <div class="hstat">FPS <b id="hFps">—</b></div>
</header>

<main>
  <div class="video-panel">
    <img id="stream" src="/video_feed?camera_id=0" alt="视频流">
    <div class="alert-banner" id="alertBanner">⚠ 检测到人员入侵！</div>
    <div class="count-badge hidden" id="countBadge">当前 <span id="personCount">0</span> 人</div>
  </div>

  <aside class="sidebar">
    <div class="sb-section">
      <h3>实时统计</h3>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="val" id="statPerson">0</div>
          <div class="lbl">当前人数</div>
        </div>
        <div class="stat-card">
          <div class="val" id="statAlerts">0</div>
          <div class="lbl">今日告警</div>
        </div>
        <div class="stat-card stat-card--wide">
          <div class="val stat-val--sm" id="statLastAlert">—</div>
          <div class="lbl">最后告警时间</div>
        </div>
      </div>
    </div>

    <div class="sb-section">
      <h3>系统状态</h3>
      <div class="health-row"><span>摄像头</span><span class="badge" id="hCamera">—</span></div>
      <div class="health-row"><span>AI 模型</span><span class="badge" id="hModel">—</span></div>
      <div class="health-row"><span>帧延迟</span><span class="badge" id="hFrameAge">—</span></div>
      <div class="health-row"><span>WS 客户端</span><span class="badge" id="hWsClients">—</span></div>
    </div>

    <div class="sb-section">
      <h3>检测设置</h3>
      <div class="control-row">
        <label for="toggleDetection">YOLO 检测</label>
        <label class="toggle">
          <input type="checkbox" id="toggleDetection" checked onchange="setDetection(this.checked)" aria-label="启用YOLO检测">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="range-row">
        <label class="range-label" for="confSlider">置信度阈值 <span id="confVal">0.50</span></label>
        <input type="range" id="confSlider" min="10" max="95" value="50"
               oninput="updateConf(this.value)" onchange="applyConf(this.value)"
               aria-label="置信度阈值">
      </div>
    </div>

    <div class="alert-list-wrap">
      <h3>告警记录</h3>
      <div id="alertList"><div class="log-empty">暂无告警</div></div>
    </div>
  </aside>
</main>

<div class="log-panel">
  <div class="log-panel-header">
    <h3>系统日志</h3>
    <button type="button" class="level-btn active-all" onclick="setFilter('all', this)">全部</button>
    <button type="button" class="level-btn" onclick="setFilter('info', this)">INFO</button>
    <button type="button" class="level-btn" onclick="setFilter('warning', this)">WARN</button>
    <button type="button" class="level-btn" onclick="setFilter('error', this)">ERROR</button>
    <div class="spacer"></div>
    <button type="button" class="btn" onclick="loadHistoryLogs()">加载历史</button>
    <button type="button" class="btn danger" onclick="clearLogPanel()">清空</button>
  </div>
  <div class="log-entries" id="logEntries"></div>
</div>

<footer>
  <button type="button" class="btn" onclick="reloadStream()">刷新画面</button>
  <button type="button" class="btn danger" onclick="clearAlerts()">清空告警</button>
  <div class="spacer"></div>
  <div class="footer-info" id="footerInfo">YOLOv8n · mAP50=0.802 · MJPEG</div>
</footer>

<script>
const CAMERA_ID = 0;
let alertCount = 0, alertTimer = null, logFilter = 'all';

// ── WebSocket ─────────────────────────────────────────────────────────
const wsPill  = document.getElementById('wsPill');
const wsLabel = document.getElementById('wsLabel');
let ws, wsRetryDelay = 2000, heartbeatTimer = null;

function connectWS() {
  if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/alert`);

  ws.onopen = () => {
    wsPill.className = 'ws-pill connected';
    wsLabel.textContent = '已连接';
    wsRetryDelay = 2000;
    heartbeatTimer = setInterval(() => {
      if (ws.readyState === WebSocket.OPEN) ws.send('ping');
    }, 20000);
  };

  ws.onmessage = (e) => {
    let data;
    try { data = JSON.parse(e.data); } catch { return; }
    if (data.type === 'pong')   return;
    if (data.type === 'alert')  handleAlert(data);
    if (data.type === 'status') handleStatus(data);
    if (data.type === 'log')    appendLogEntry(data);
  };

  ws.onerror = () => {
    wsPill.className = 'ws-pill error';
    wsLabel.textContent = '连接错误';
  };

  ws.onclose = () => {
    wsPill.className = 'ws-pill';
    wsLabel.textContent = `重连中 (${wsRetryDelay / 1000}s)…`;
    if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
    setTimeout(connectWS, wsRetryDelay);
    wsRetryDelay = Math.min(wsRetryDelay * 2, 30000);
  };
}
connectWS();

// ── 告警处理 ──────────────────────────────────────────────────────────
function handleAlert(data) {
  alertCount++;
  document.getElementById('hAlertCount').textContent = alertCount;
  document.getElementById('statAlerts').textContent  = alertCount;

  const count  = data.data?.person_count ?? 0;
  const newIds = data.data?.new_track_ids ?? [];
  document.getElementById('statPerson').textContent  = count;
  document.getElementById('personCount').textContent = count;
  document.getElementById('countBadge').classList.remove('hidden');

  const ts = fmtTime(data.timestamp);
  document.getElementById('statLastAlert').textContent = ts;

  const banner = document.getElementById('alertBanner');
  banner.textContent = `⚠ 检测到 ${newIds.length} 名新人员（共 ${count} 人）`;
  banner.classList.add('show');
  clearTimeout(alertTimer);
  alertTimer = setTimeout(() => {
    banner.classList.remove('show');
    document.getElementById('countBadge').classList.add('hidden');
  }, 5000);

  addAlertItem(ts, data.message, newIds, 'alert');
}

// ── 状态事件 ──────────────────────────────────────────────────────────
function handleStatus(data) {
  const d = data.data || {};
  if ('camera_connected' in d)
    setBadge('hCamera', d.camera_connected ? '在线' : '离线', d.camera_connected ? 'ok' : 'err');
  if ('model_loaded' in d)
    setBadge('hModel', d.model_loaded ? '已加载' : '未加载', d.model_loaded ? 'ok' : 'err');
  addAlertItem(fmtTime(data.timestamp), data.message, [], 'status');
}

function addAlertItem(time, msg, trackIds, kind) {
  const list  = document.getElementById('alertList');
  const empty = list.querySelector('.log-empty');
  if (empty) empty.remove();
  const idStr = trackIds.length ? ` <span style="color:var(--muted)">ID:${trackIds.join(',')}</span>` : '';
  const item  = document.createElement('div');
  item.className = 'log-item';
  item.innerHTML = `
    <div class="dot dot-${kind}"></div>
    <div>
      <div class="log-time">${time}</div>
      <div class="log-msg">${msg}${idStr}</div>
    </div>`;
  list.prepend(item);
  while (list.children.length > 50) list.lastChild.remove();
}

// ── 日志面板 ──────────────────────────────────────────────────────────
function appendLogEntry(entry) {
  const container = document.getElementById('logEntries');
  const el = document.createElement('div');
  el.className = 'log-entry';
  el.dataset.level = entry.level;
  if (logFilter !== 'all' && entry.level !== logFilter) el.style.display = 'none';
  el.innerHTML = `
    <span class="le-ts">${fmtTime(entry.timestamp)}</span>
    <span class="le-lvl ${entry.level}">${entry.level.toUpperCase()}</span>
    <span class="le-evt">${entry.event || ''}</span>
    <span class="le-msg">${entry.message}</span>`;
  container.prepend(el);
  while (container.children.length > 200) container.lastChild.remove();
}

function setFilter(level, btn) {
  logFilter = level;
  document.querySelectorAll('.level-btn').forEach(b => b.className = 'level-btn');
  btn.className = `level-btn active-${level}`;
  document.querySelectorAll('#logEntries .log-entry').forEach(el => {
    el.style.display = (level === 'all' || el.dataset.level === level) ? '' : 'none';
  });
}

async function loadHistoryLogs() {
  try {
    const res  = await fetch('/api/logs?limit=200');
    const json = await res.json();
    document.getElementById('logEntries').innerHTML = '';
    [...json.logs].reverse().forEach(e => appendLogEntry(e));
  } catch (err) { console.error('加载历史日志失败', err); }
}

function clearLogPanel() { document.getElementById('logEntries').innerHTML = ''; }

// ── Health 轮询 ───────────────────────────────────────────────────────
async function pollHealth() {
  try {
    const h   = await fetch('/health').then(r => r.json());
    const cam = h.cameras?.[0];
    if (cam) {
      setBadge('hCamera',   cam.connected    ? '在线'   : '离线',   cam.connected    ? 'ok' : 'err');
      setBadge('hModel',    cam.model_loaded ? '已加载' : '未加载', cam.model_loaded ? 'ok' : 'err');
      const age = cam.last_frame_age_ms;
      setBadge('hFrameAge', age != null ? `${age}ms` : '—', age < 200 ? 'ok' : 'warn');
      document.getElementById('hFps').textContent = cam.fps ? cam.fps.toFixed(1) : '—';

      // 实时人数来自 active_tracks（不依赖告警事件）
      const tracks = cam.active_tracks ?? 0;
      document.getElementById('statPerson').textContent  = tracks;
      document.getElementById('personCount').textContent = tracks;
      if (tracks > 0) {
        document.getElementById('countBadge').classList.remove('hidden');
      } else {
        document.getElementById('countBadge').classList.add('hidden');
      }
    }
    setBadge('hWsClients', h.ws_clients ?? '—', 'ok');
    document.getElementById('footerInfo').textContent =
      `YOLOv8n · mAP50=0.802 · 运行 ${fmtUptime(h.uptime_sec)}`;
  } catch {
    setBadge('hCamera', '离线', 'err');
  }
}
setInterval(pollHealth, 2000);
pollHealth();

// ── 控制 ──────────────────────────────────────────────────────────────
function setDetection(enabled) {
  fetch(`/api/camera/${CAMERA_ID}/config`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ enabled }),
  });
}
function updateConf(val) { document.getElementById('confVal').textContent = (val / 100).toFixed(2); }
function applyConf(val) {
  fetch(`/api/camera/${CAMERA_ID}/config`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ conf: val / 100 }),
  });
}
function reloadStream() {
  document.getElementById('stream').src = `/video_feed?camera_id=${CAMERA_ID}&t=${Date.now()}`;
}
function clearAlerts() {
  document.getElementById('alertList').innerHTML = '<div class="log-empty">暂无告警</div>';
  alertCount = 0;
  document.getElementById('hAlertCount').textContent = 0;
  document.getElementById('statAlerts').textContent  = 0;
}

// ── 工具 ──────────────────────────────────────────────────────────────
function fmtTime(ts) {
  if (!ts) return '—';
  try { return new Date(ts).toLocaleTimeString('zh-CN'); } catch { return ts; }
}
function fmtUptime(sec) {
  if (!sec && sec !== 0) return '—';
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  if (h > 0) return `${h}h${m}m`;
  if (m > 0) return `${m}m${s}s`;
  return `${s}s`;
}
function setBadge(id, text, cls) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = `badge ${cls || ''}`;
}
</script>
</body>
</html>
