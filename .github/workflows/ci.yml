name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/ --select E,F,W --ignore E501
      - run: ruff format backend/ --check --diff

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - name: Audit dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt --strict || true

  test:
    runs-on: ubuntu-latest
    needs: [lint, security]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: security_monitor
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt pytest-cov
      - name: Run unit tests
        env:
          YOLO_DATABASE_PASSWORD: test_password
          YOLO_AUTH_SECRET_KEY: test_secret_key_for_ci_only_32bytes!!
          YOLO_AUTH_INIT_ADMIN_PASSWORD: test_admin_pass
          CONFIG_FILE: config.test.yaml
        run: pytest test/ -m "unit or api" --tb=short -q --timeout=60
      - name: Run coverage
        env:
          YOLO_DATABASE_PASSWORD: test_password
          YOLO_AUTH_SECRET_KEY: test_secret_key_for_ci_only_32bytes!!
          YOLO_AUTH_INIT_ADMIN_PASSWORD: test_admin_pass
          CONFIG_FILE: config.test.yaml
        run: pytest test/ -m "unit" --cov=backend --cov-report=term-missing --cov-report=xml --cov-fail-under=30 --tb=short -q --timeout=60
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker build -t safecam:${{ github.sha }} -t safecam:latest .
      - name: Verify image
        run: docker image inspect safecam:${{ github.sha }}
      - name: Save image as artifact
        run: docker save safecam:latest | gzip > safecam-image.tar.gz
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: safecam-image.tar.gz
          retention-days: 7
